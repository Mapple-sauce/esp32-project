[env:featheresp32]
platform = espressif32
board = featheresp32
framework = arduino
monitor_speed = 115200

build_flags =
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MOSI=18
  -D TFT_SCLK=2
  -D TFT_CS=5
  -D TFT_DC=4
  -D TFT_RST=15
  -D TFT_BL=21
  -D TFT_MISO=19
  -D SPI_FREQUENCY=27000000
  -D TFT_RGB_ORDER=TFT_BGR
  -D TOUCH_CS=-1

lib_deps = bodmer/TFT_eSPI @ ^2.5.0
